services:
  app:
    image: ${M_IMAGE:-ghcr.io/tung68nt/tulie-mentoring:latest}
    container_name: mentoring_app
    restart: always
    ports:
      - "${APP_PORT:-3002}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - DIRECT_URL=${DIRECT_URL:?DIRECT_URL is required}
      - AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET is required}
      - AUTH_URL=${AUTH_URL:-https://mentoring.tulie.vn}
      - NEXTAUTH_URL=${AUTH_URL:-https://mentoring.tulie.vn}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - AUTH_TRUST_HOST=true
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM:-"Tulie Mentoring <noreply@tulie.vn>"}
      - CRON_SECRET=${CRON_SECRET}
      - NODE_OPTIONS=--max-old-space-size=1536
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/auth/session').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network

networks:
  app-network:
    name: mentoring_network
    driver: bridge
